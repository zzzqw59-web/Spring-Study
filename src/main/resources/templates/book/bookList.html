<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <div class="container text-center">
        <div class="text-center mt-3">
            <h4>책 정보 리스트 및 입력화면</h4>
            <div class="row">
                <div class="text-center">
                    <h5>책 리스트</h5>
                </div>
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th scope="col">책번호</th>
                            <th scope="col">책제목</th>
                            <th scope="col">책저자</th>
                            <th scope="col">출판사</th>
                            <th scope="col">출간연도</th>
                            <th scope="col">책가격</th>
                        </tr>
                    </thead>
                    <tbody class="table-group-divider">
                        <th:block th:if="${#lists.isEmpty(bookList)}">
                            <tr>
                                <td colspan="6">등록된 책이 없습니다.</td>
                            </tr>
                        </th:block>
                        <th:block th:if="${not #lists.isEmpty(bookList)}">
                            <tr class="text-left" th:each="book : ${bookList}" th:object="${book}">
                                <th scope="row" th:text="*{bookId}"></th>
                                <td th:text="*{title}"></td>
                                <td th:text="*{author}"></td>
                                <td th:text="*{publisher}"></td>
                                <td th:text="*{publishDate}"></td>
                                <td th:text="*{price}"></td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
